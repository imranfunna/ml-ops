name: FlowSure MLOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:

  # -----------------------------------------------------------------------
  # 1. CI — lint + unit tests draaien op elke PR
  # -----------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/ notebooks/ tests/

      - name: Unit tests (pytest)
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  # -----------------------------------------------------------------------
  # 2. CD dev — deploy naar development target op elke merge naar main
  # -----------------------------------------------------------------------
  cd_dev:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy bundle to dev
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: |
          databricks bundle validate -t dev
          databricks bundle deploy   -t dev

      - name: Trigger data-pipeline job (smoke test)
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: databricks bundle run flowsure_full_pipeline -t dev

  # -----------------------------------------------------------------------
  # 3. CD prod — alleen op version-tags (v1.2.3 …) → gated approval
  # -----------------------------------------------------------------------
  cd_prod:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production   # vereist manual approval in GH-instellingen
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy bundle to prod
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks bundle validate -t prod
          databricks bundle deploy   -t prod

  # -----------------------------------------------------------------------
  # 4. CT — nightly retrain check (roept alleen retrain-job aan als drift alert)
  # -----------------------------------------------------------------------
  ct_nightly_check:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Query recent alerts and retrain if needed
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          alerts=$(databricks sql-warehouses execute \
              --warehouse-id ${{ secrets.SQL_WAREHOUSE_ID }} \
              --query "SELECT count(*) FROM hive_metastore.flowsure.alerts WHERE severity='high' AND created_ts >= current_timestamp() - INTERVAL 1 DAY" \
              --output json | jq '.data[0][0]')
          if [ "$alerts" -gt 0 ]; then
            echo "Drift detected — triggering retrain"
            databricks bundle run flowsure_retrain_on_drift -t prod
          else
            echo "No drift — skipping retrain"
          fi
