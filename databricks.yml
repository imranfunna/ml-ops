# Databricks Asset Bundle — declaratieve deployment van notebooks + jobs.
# Volledig geoptimaliseerd voor een gedeelde studenten-workspace.

bundle:
  name: flowsure-mlops

# ---------------------------------------------------------------------------
# Targets = environments. Beiden maken gebruik van je eigen veilige 
# studentenfolder om SCIM 401-fouten en folder-locks te omzeilen.
# ---------------------------------------------------------------------------
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-4fba3147-3ed4.cloud.databricks.com
      root_path: /Workspace/Users/24110167@student.hhs.nl/.bundle/flowsure/dev
  prod:
    mode: development
    workspace:
      host: https://dbc-4fba3147-3ed4.cloud.databricks.com
      root_path: /Workspace/Users/24110167@student.hhs.nl/.bundle/flowsure/prod

# ---------------------------------------------------------------------------
# Resources (Volledig serverless gemaakt)
# ---------------------------------------------------------------------------
resources:

  jobs:

    # ---------- Hoofd-pipeline: dagelijks om 03:00 UTC -----------------
    flowsure_full_pipeline:
      name: flowsure-full-pipeline
      schedule:
        quartz_cron_expression: "0 0 3 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      email_notifications:
        on_failure: [ mlops-alerts@flowsure.com ]
      max_concurrent_runs: 1
      tasks:
        - task_key: data_pipeline
          notebook_task: { notebook_path: notebooks/01_data_pipeline.py }
        - task_key: train_edge
          depends_on: [{ task_key: data_pipeline }]
          notebook_task: { notebook_path: notebooks/02_train_edge_model.py }

        - task_key: train_cloud
          depends_on: [{ task_key: data_pipeline }]
          notebook_task: { notebook_path: notebooks/03_train_cloud_model.py }
        - task_key: deploy_and_infer
          depends_on:
            - { task_key: train_edge }
            - { task_key: train_cloud }
          notebook_task: { notebook_path: notebooks/04_deploy_and_infer.py }
        - task_key: monitor
          depends_on: [{ task_key: deploy_and_infer }]
          notebook_task: { notebook_path: notebooks/05_monitor.py }

    # ---------- Streaming-inference: 24/7 continuous ------------------
    flowsure_streaming_inference:
      name: flowsure-streaming-inference
      continuous: { pause_status: PAUSED }
      tasks:
        - task_key: stream
          notebook_task:
            notebook_path: notebooks/04_deploy_and_infer.py
            base_parameters: { mode: streaming_only }

    # ---------- CT: retrain-job getriggerd door drift alerts ----------
    flowsure_retrain_on_drift:
      name: flowsure-retrain-on-drift
      tasks:
        - task_key: retrain_edge
          notebook_task: { notebook_path: notebooks/02_train_edge_model.py }
        - task_key: redeploy
          depends_on: [{ task_key: retrain_edge }]
          notebook_task: { notebook_path: notebooks/04_deploy_and_infer.py }