<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowSure AI Responder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="url"], textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="url"]:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 16px;
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        #result-box h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .meta-tags {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--primary);
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>FlowSure Responder</h1>
            <p>Cloud Semantic Search AI</p>
        </div>

        <div class="input-group">
            <label>AWS API Gateway URL</label>
            <input type="url" id="apiUrl" placeholder="https://abc123xyz.execute-api.us-east-1.amazonaws.com/predict">
        </div>

        <div class="input-group">
            <label>Customer Support Ticket</label>
            <textarea id="ticketText" placeholder="Example: My account is blocked, how do I reset my password?"></textarea>
        </div>

        <button onclick="askAI()">Generate Response</button>

        <div id="loader" class="loader">Consulting Knowledge Base...</div>

        <div id="result-box">
            <h3>Suggested Response</h3>
            <div id="response-text" style="line-height: 1.6; font-size: 15px;"></div>
            <div class="meta-tags">
                <div class="tag">🎯 Intent: <strong id="intent-label" style="color: white;"></strong></div>
                <div class="tag">⚡ Confidence: <strong id="confidence-label" style="color: white;"></strong></div>
            </div>
        </div>
    </div>

    <script>
        async function askAI() {
            const url = document.getElementById('apiUrl').value.trim();
            const text = document.getElementById('ticketText').value.trim();
            const resultBox = document.getElementById('result-box');
            const loader = document.getElementById('loader');

            if (!url) {
                alert("Please enter your AWS API Gateway URL.");
                return;
            }
            if (!text) {
                alert("Please enter a customer ticket.");
                return;
            }

            // Hide old results, show loader
            resultBox.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Populate results
                document.getElementById('response-text').innerText = data.suggested_response;
                document.getElementById('intent-label').innerText = data.matched_intent;
                
                // Format confidence as percentage
                const confPercent = (data.confidence * 100).toFixed(1);
                document.getElementById('confidence-label').innerText = `${confPercent}%`;

                // Show results
                loader.style.display = 'none';
                resultBox.style.display = 'block';

            } catch (error) {
                loader.style.display = 'none';
                alert("Error connecting to the API: " + error.message + "\n\nMake sure your AWS API Gateway has CORS enabled if you are running this from a local file!");
            }
        }
    </script>
</body>
</html>
